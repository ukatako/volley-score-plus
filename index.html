<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Volley Score Plus</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #f4f4f6;
  color: #111;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  background: #f7f7f7;
}

.header {
  background: #1557e6;
  color: white;
  padding: 24px 18px 18px;
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-title {
  flex: 1;
  text-align: center;
}

.header-btn {
  border: none;
  background: white;
  color: #1557e6;
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 15px;
  font-weight: 900;
}

.back-btn {
  border: none;
  background: none;
  color: white;
  font-size: 15px;
  font-weight: 800;
}

.screen {
  display: none;
  padding: 0 18px 24px;
}

.screen.active {
  display: block;
}

.header-sub {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0;
}

.header-sub h2 {
  margin: 0;
  font-size: 24px;
}

.text-btn {
  border: none;
  background: none;
  color: #1557e6;
  font-size: 17px;
  font-weight: 800;
}

.match-card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
}

.match-date {
  color: #666;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}

.match-opponent {
  font-size: 19px;
  font-weight: 900;
  margin-bottom: 8px;
}

.match-score {
  font-size: 36px;
  font-weight: 900;
}
